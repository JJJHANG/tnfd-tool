name: Deploy Frontend

on:
    pull_request:
        paths:
            - "frontend/**"
            - ".github/workflows/deploy-frontend.yml"
    push:
        branches:
            - main
        paths:
            - "frontend/**"
            - ".github/workflows/deploy-frontend.yml"
    workflow_dispatch:

permissions:
    contents: read
    id-token: write

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build
              env:
                  REACT_APP_API_BASE_URL: ${{ vars.REACT_APP_API_BASE_URL }}
                  CI: false

    deploy:
        name: Deploy to S3
        runs-on: ubuntu-latest
        needs: build
        if: github.event_name != 'pull_request'
        permissions:
            contents: read
            id-token: write
        defaults:
            run:
                working-directory: frontend

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Validate deployment variables
              run: |
                  test -n "${{ vars.REACT_APP_API_BASE_URL }}"
                  test -n "${{ vars.AWS_REGION }}"
                  test -n "${{ vars.S3_BUCKET }}"
                  test -n "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
                  test -n "${{ secrets.AWS_ROLE_TO_ASSUME }}"

            - name: Build
              run: npm run build
              env:
                  REACT_APP_API_BASE_URL: ${{ vars.REACT_APP_API_BASE_URL }}
                  CI: false

            - name: List build output
              run: |
                  test -f build/index.html
                  find build -maxdepth 2 -type f | sort | head -50

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
                  aws-region: ${{ vars.AWS_REGION }}

            - name: Show deployment target
              run: |
                  aws sts get-caller-identity
                  echo "Deploying to s3://${{ vars.S3_BUCKET }}"

            - name: Upload hashed assets
              run: >
                  aws s3 sync build/ s3://${{ vars.S3_BUCKET }}
                  --delete
                  --exclude "index.html"
                  --cache-control "public,max-age=31536000,immutable"

            - name: Upload index
              run: >
                  aws s3 cp build/index.html s3://${{ vars.S3_BUCKET }}/index.html
                  --cache-control "no-cache,no-store,must-revalidate"
                  --content-type "text/html"

            - name: Verify S3 upload
              run: |
                  aws s3 ls s3://${{ vars.S3_BUCKET }}/ --recursive --summarize

            - name: Invalidate CloudFront
              run: >
                  aws cloudfront create-invalidation
                  --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
                  --paths "/*"
